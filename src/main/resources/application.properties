# =============================================
# CloudPulse Application Configuration
# =============================================

# Application name (appears in Prometheus metrics)
spring.application.name=cloudpulse

# Expose health, prometheus, and metrics actuator endpoints
management.endpoints.web.exposure.include=health,prometheus,metrics

# Show full health details (disk space, ping, etc.)
management.endpoint.health.show-details=always

# Tag all metrics with application name (required for Grafana Dashboard 4701)
management.metrics.tags.application=cloudpulse

# MongoDB connection (overridden by SPRING_DATA_MONGODB_URI in Docker)
spring.data.mongodb.uri=mongodb://localhost:27017/cloudpulse
